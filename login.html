<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kinetic Luminary - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-container": "#543098",
              "surface-bright": "#2c2c2c",
              "on-secondary-fixed-variant": "#5e3ba3",
              "tertiary-container": "#f7798b",
              "error": "#ff6e84",
              "surface": "#0e0e0e",
              "tertiary-fixed": "#ff909e",
              "inverse-primary": "#8523dd",
              "inverse-surface": "#fcf9f8",
              "inverse-on-surface": "#565555",
              "on-primary-fixed": "#000000",
              "on-surface-variant": "#adaaaa",
              "on-secondary-container": "#dbc7ff",
              "primary-dim": "#9c42f4",
              "on-surface": "#ffffff",
              "on-secondary": "#310072",
              "surface-dim": "#0e0e0e",
              "secondary-dim": "#ae8af8",
              "surface-tint": "#ca98ff",
              "on-primary-container": "#350062",
              "primary-container": "#c185ff",
              "primary-fixed": "#c185ff",
              "surface-container-low": "#131313",
              "secondary": "#b390fe",
              "outline": "#767575",
              "on-tertiary-fixed": "#39000e",
              "on-secondary-fixed": "#411885",
              "on-background": "#ffffff",
              "primary": "#ca98ff",
              "surface-container-lowest": "#000000",
              "surface-variant": "#262626",
              "secondary-fixed-dim": "#d0b8ff",
              "error-dim": "#d73357",
              "surface-container": "#1a1a1a",
              "outline-variant": "#484847",
              "background": "#0e0e0e",
              "primary-fixed-dim": "#b772ff",
              "error-container": "#a70138",
              "surface-container-highest": "#262626",
              "on-tertiary-container": "#4d0015",
              "on-tertiary": "#62041f",
              "tertiary-fixed-dim": "#fa7c8d",
              "surface-container-high": "#20201f",
              "secondary-fixed": "#dcc9ff",
              "on-tertiary-fixed-variant": "#711229",
              "tertiary": "#ff8b9a",
              "on-error-container": "#ffb2b9",
              "tertiary-dim": "#f47788",
              "on-primary": "#46007d",
              "on-primary-fixed-variant": "#420078",
              "on-error": "#490013"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(38, 38, 38, 0.6);
            backdrop-filter: blur(20px);
        }
        .kinetic-gradient {
            background: linear-gradient(135deg, #ca98ff 0%, #9c42f4 100%);
        }
        .mesh-background {
            background-color: #0e0e0e;
            background-image: 
                radial-gradient(at 0% 0%, rgba(202, 152, 255, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(156, 66, 244, 0.05) 0px, transparent 50%);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface mesh-background min-h-screen flex flex-col items-center justify-center p-6">
<div class="w-full max-w-[440px]">
<!-- Branding Header -->
<div class="flex flex-col items-center mb-10 text-center">
<div class="mb-6 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<h1 class="font-headline font-black text-3xl tracking-tighter text-primary">Kinetic Luminary</h1>
</div>
<h2 class="font-headline text-2xl font-bold tracking-tight text-on-surface mb-2">Welcome Back</h2>
<p class="font-body text-on-surface-variant text-sm">Access your digital atelier and synchronize workflows.</p>
</div>
<!-- Login Container -->
<div class="glass-card rounded-xl p-8 shadow-[0_20px_50px_rgba(138,43,226,0.1)] border border-outline-variant/15">
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="block font-label text-[11px] font-medium uppercase tracking-widest text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-highest text-on-surface border-none rounded-lg px-4 py-3.5 focus:ring-1 focus:ring-primary/40 focus:bg-surface-variant transition-all placeholder:text-outline/50 text-sm" id="email" placeholder="name@kinetic.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex justify-between items-center">
<label class="block font-label text-[11px] font-medium uppercase tracking-widest text-on-surface-variant" for="password">Password</label>
<a class="text-[11px] font-medium uppercase tracking-widest text-primary hover:text-primary-dim transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-highest text-on-surface border-none rounded-lg px-4 py-3.5 focus:ring-1 focus:ring-primary/40 focus:bg-surface-variant transition-all placeholder:text-outline/50 text-sm" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="w-4 h-4 rounded bg-surface-container-highest border-none text-primary focus:ring-offset-surface focus:ring-primary cursor-pointer" id="remember" type="checkbox"/>
<label class="ml-2 text-xs text-on-surface-variant cursor-pointer select-none" for="remember">Remember this session for 30 days</label>
</div>
<!-- Action Button -->
<a href="/" class="w-full kinetic-gradient text-on-primary-fixed font-headline font-extrabold py-4 rounded-lg shadow-lg hover:shadow-primary/20 active:scale-95 transition-all duration-200 uppercase tracking-widest text-sm text-center block">
                    Sign In
                </a>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/20"></div>
</div>
<div class="relative flex justify-center text-[10px] uppercase tracking-[0.2em]">
<span class="bg-surface-container-highest/10 px-4 text-on-surface-variant backdrop-blur-md">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 bg-surface-container-highest hover:bg-surface-variant text-on-surface py-3 px-4 rounded-lg transition-colors border border-outline-variant/10 text-xs font-medium">
<svg class="w-4 h-4" fill="currentColor" viewbox="0 0 24 24">
<path d="M12.48 10.92v3.28h7.84c-.24 1.84-.908 3.152-1.928 4.176-1.02 1.024-2.6 2.144-5.912 2.144-5.388 0-9.712-4.352-9.712-9.712 0-5.36 4.324-9.712 9.712-9.712 2.924 0 5.096 1.148 6.64 2.6l2.312-2.312C19.16 2.016 16.148.5 12.48.5 5.86.5.5 5.86.5 12.5s5.36 12 11.98 12c3.584 0 6.288-1.184 8.36-3.352 2.144-2.144 2.824-5.184 2.824-7.584 0-.72-.064-1.4-.184-2.064h-10.512z"></path>
</svg>
                    Google
                </button>
<button class="flex items-center justify-center gap-2 bg-surface-container-highest hover:bg-surface-variant text-on-surface py-3 px-4 rounded-lg transition-colors border border-outline-variant/10 text-xs font-medium">
<svg class="w-4 h-4" fill="currentColor" viewbox="0 0 24 24">
<path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"></path>
</svg>
                    GitHub
                </button>
</div>
</div>
<!-- Footer -->
<div class="mt-8 text-center">
<p class="text-sm text-on-surface-variant">
                New to the atelier? 
                <a class="text-primary font-semibold hover:underline underline-offset-4 ml-1" href="#">Create an account</a>
</p>
</div>
</div>
<!-- Decorative elements -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden">
<div class="absolute top-[10%] right-[15%] w-[400px] h-[400px] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[5%] left-[10%] w-[300px] h-[300px] bg-secondary-container/10 rounded-full blur-[100px]"></div>
</div>
</body></html>
